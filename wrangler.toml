name = "axevora-chat"
main = "workers/chat-server.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "CHAT_ROOM", class_name = "ChatRoom" }
]

[[d1_databases]]
binding = "COMMUNITY_DB"
database_name = "axevora-community"
database_id = "75234cc3-483e-4a85-b293-41feef73ed43"

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]

[env.production]
name = "axevora-chat-prod"
routes = [
  { pattern = "chat.axevora.workers.dev/*", zone_name = "axevora.workers.dev" }
]

